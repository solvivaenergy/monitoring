# Render.com deployment — Web Service + Background Worker
services:
  # Web API (dashboard, webhooks)
  - type: web
    name: solviva-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SOLIS_CLOUD_KEY_ID
        sync: false
      - key: SOLIS_CLOUD_KEY_SECRET
        sync: false

  # Daily sync cron: Solis → Supabase (11:55 PM PHT / 3:55 PM UTC)
  - type: cron
    name: solviva-sync
    runtime: docker
    plan: starter
    schedule: "55 15 * * *"  # 3:55 PM UTC = 11:55 PM PHT
    dockerfilePath: ./Dockerfile.worker
    envVars:
      - key: SOLIS_CLOUD_KEY_ID
        sync: false
      - key: SOLIS_CLOUD_KEY_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
