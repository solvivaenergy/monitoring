# Render.com deployment — Web Service + Background Worker
services:
  # Web API (dashboard, webhooks)
  - type: web
    name: solviva-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SOLIS_CLOUD_KEY_ID
        sync: false
      - key: SOLIS_CLOUD_KEY_SECRET
        sync: false

  # Background sync worker: Solis → Supabase (every 15 min)
  - type: worker
    name: solviva-sync
    runtime: docker
    plan: starter  # $7/mo — always-on, no spin-down
    dockerfilePath: ./Dockerfile.worker
    envVars:
      - key: SOLIS_CLOUD_KEY_ID
        sync: false
      - key: SOLIS_CLOUD_KEY_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
