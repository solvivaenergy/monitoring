# Render.com deployment — Web Service + Background Worker
services:
  # Web API (dashboard, webhooks)
  - type: web
    name: solviva-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SOLIS_CLOUD_KEY_ID
        sync: false
      - key: SOLIS_CLOUD_KEY_SECRET
        sync: false

  # Daily sync cron: Solis → Supabase (2:00 AM PHT via Render cron)
  - type: cron
    name: solviva-sync
    runtime: docker
    plan: starter
    schedule: "0 18 * * *"  # 6:00 PM UTC = 2:00 AM PHT
    dockerfilePath: ./Dockerfile.worker
    envVars:
      - key: SOLIS_CLOUD_KEY_ID
        sync: false
      - key: SOLIS_CLOUD_KEY_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  # 5-minute interval sync cron: Solis stationDay -> Supabase energy_readings_five_minutes
  - type: cron
    name: solviva-five-minute-sync
    runtime: docker
    plan: starter
    schedule: "*/5 * * * *"
    dockerfilePath: ./Dockerfile.worker.five_minutes
    envVars:
      - key: SOLIS_CLOUD_KEY_ID
        sync: false
      - key: SOLIS_CLOUD_KEY_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
